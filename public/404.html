<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <script>
      const defaultLocale = "es";
      const locales = new Set(["es", "en"]);
      const localizedRoutes = {
        es: {
          home: "",
          about: "sobre-mi",
          "banner-nubecommerce": "casos/banner-nubecommerce",
          "carrito-amazon": "casos/carrito-amazon",
          "cta-migrar-tienda": "casos/cta-migrar-tienda",
          "recursos-descargables": "casos/recursos-descargables",
          ristretto: "casos/ristretto"
        },
        en: {
          home: "",
          about: "about",
          "banner-nubecommerce": "case-studies/nubecommerce-banner",
          "carrito-amazon": "case-studies/amazon-cart",
          "cta-migrar-tienda": "case-studies/store-migration-cta",
          "recursos-descargables": "case-studies/downloadable-resources",
          ristretto: "case-studies/ristretto"
        }
      };

      const normalizeRoutePath = (route) =>
        !route || route === "/" ? "/" : `/${route.replace(/^\/|\/$/g, "")}/`;

      const localizeRoute = (routeId, locale, options = {}) => {
        const normalizedRoute = localizedRoutes[locale]?.[routeId] ?? localizedRoutes[defaultLocale]?.[routeId] ?? "";
        const explicit = options.explicit === true;

        if (locale === defaultLocale && !explicit) {
          return `/${normalizedRoute}${normalizedRoute ? "/" : ""}`;
        }

        return `/${[locale, normalizedRoute].filter(Boolean).join("/")}/`;
      };

      const pages = Object.keys(localizedRoutes[defaultLocale]);

      const getCanonicalPathname = (pathname = "/") => {
        const segments = pathname.split("/").filter(Boolean);
        const firstSegment = segments[0];
        const hasExplicitLocale = locales.has(firstSegment);
        const locale = hasExplicitLocale ? firstSegment : defaultLocale;
        const pathSegments = hasExplicitLocale ? segments.slice(1) : segments;
        const strippedPath = `/${pathSegments.join("/")}${pathSegments.length ? "/" : ""}`;
        const normalizedPath = normalizeRoutePath(strippedPath);

        const exactMatch = pages.find((pageId) => normalizeRoutePath(localizedRoutes[locale]?.[pageId] ?? "") === normalizedPath);

        if (exactMatch) {
          return localizeRoute(exactMatch, locale, { explicit: hasExplicitLocale });
        }

        const nearestRoute = pages
          .map((pageId) => ({ pageId, route: normalizeRoutePath(localizedRoutes[locale]?.[pageId] ?? "") }))
          .filter(({ route }) => route !== "/" && normalizedPath.startsWith(route))
          .sort((left, right) => right.route.length - left.route.length)[0];

        if (nearestRoute) {
          return localizeRoute(nearestRoute.pageId, locale, { explicit: hasExplicitLocale });
        }

        return localizeRoute("home", locale, { explicit: hasExplicitLocale });
      };

      const target = getCanonicalPathname(window.location.pathname);
      window.location.replace(`${target}${window.location.search}${window.location.hash}`);
    </script>
  </body>
</html>
